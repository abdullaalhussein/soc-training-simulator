name: Deploy to Railway

on:
  push:
    branches: [master]

concurrency:
  group: deploy-railway
  cancel-in-progress: true

jobs:
  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy server
        run: railway up --service ${{ secrets.RAILWAY_SERVER_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  deploy-client:
    name: Deploy Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy client
        run: railway up --service ${{ secrets.RAILWAY_CLIENT_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
